name: Deploy Online Boutique to Cloud Run

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GAR_REPO: online-boutique
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push productcatalogservice
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/productcatalogservice:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" ./src/productcatalogservice
          docker push "$IMAGE_URI"
      - name: Deploy productcatalogservice
        id: deploy-productcatalogservice
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: productcatalogservice
          image: '${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/productcatalogservice:${{ env.IMAGE_TAG }}'
          region: '${{ env.GCP_REGION }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated --use-http2 --port=8080'
      - name: Capture productcatalogservice addr
        id: productcatalogservice-addr
        run: echo "addr=$(echo '${{ steps.deploy-productcatalogservice.outputs.url }}' | sed 's|^https://||; s|/$||'):443" >> $GITHUB_OUTPUT

      - name: Build and push currencyservice
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/currencyservice:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" ./src/currencyservice
          docker push "$IMAGE_URI"
      - name: Deploy currencyservice
        id: deploy-currencyservice
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: currencyservice
          image: '${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/currencyservice:${{ env.IMAGE_TAG }}'
          region: '${{ env.GCP_REGION }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated --use-http2 --port=8080'
          env_vars: |
            DISABLE_PROFILER=1
      - name: Capture currencyservice addr
        id: currencyservice-addr
        run: echo "addr=$(echo '${{ steps.deploy-currencyservice.outputs.url }}' | sed 's|^https://||; s|/$||'):443" >> $GITHUB_OUTPUT

      - name: Build and push cartservice
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/cartservice:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" ./src/cartservice/src
          docker push "$IMAGE_URI"
      - name: Deploy cartservice
        id: deploy-cartservice
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: cartservice
          image: '${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/cartservice:${{ env.IMAGE_TAG }}'
          region: '${{ env.GCP_REGION }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated --use-http2 --port=7070'
      - name: Capture cartservice addr
        id: cartservice-addr
        run: echo "addr=$(echo '${{ steps.deploy-cartservice.outputs.url }}' | sed 's|^https://||; s|/$||'):443" >> $GITHUB_OUTPUT

      - name: Build and push paymentservice
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/paymentservice:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" ./src/paymentservice
          docker push "$IMAGE_URI"
      - name: Deploy paymentservice
        id: deploy-paymentservice
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: paymentservice
          image: '${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/paymentservice:${{ env.IMAGE_TAG }}'
          region: '${{ env.GCP_REGION }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated --use-http2 --port=8080'
          env_vars: |
            DISABLE_PROFILER=1
      - name: Capture paymentservice addr
        id: paymentservice-addr
        run: echo "addr=$(echo '${{ steps.deploy-paymentservice.outputs.url }}' | sed 's|^https://||; s|/$||'):443" >> $GITHUB_OUTPUT

      - name: Build and push emailservice
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/emailservice:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" ./src/emailservice
          docker push "$IMAGE_URI"
      - name: Deploy emailservice
        id: deploy-emailservice
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: emailservice
          image: '${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/emailservice:${{ env.IMAGE_TAG }}'
          region: '${{ env.GCP_REGION }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated --use-http2 --port=8080'
      - name: Capture emailservice addr
        id: emailservice-addr
        run: echo "addr=$(echo '${{ steps.deploy-emailservice.outputs.url }}' | sed 's|^https://||; s|/$||'):443" >> $GITHUB_OUTPUT

      - name: Build and push shippingservice
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/shippingservice:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" ./src/shippingservice
          docker push "$IMAGE_URI"
      - name: Deploy shippingservice
        id: deploy-shippingservice
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: shippingservice
          image: '${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/shippingservice:${{ env.IMAGE_TAG }}'
          region: '${{ env.GCP_REGION }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated --use-http2 --port=8080'
      - name: Capture shippingservice addr
        id: shippingservice-addr
        run: echo "addr=$(echo '${{ steps.deploy-shippingservice.outputs.url }}' | sed 's|^https://||; s|/$||'):443" >> $GITHUB_OUTPUT

      - name: Build and push adservice
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/adservice:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" ./src/adservice
          docker push "$IMAGE_URI"
      - name: Deploy adservice
        id: deploy-adservice
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: adservice
          image: '${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/adservice:${{ env.IMAGE_TAG }}'
          region: '${{ env.GCP_REGION }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated --use-http2 --port=8080'
      - name: Capture adservice addr
        id: adservice-addr
        run: echo "addr=$(echo '${{ steps.deploy-adservice.outputs.url }}' | sed 's|^https://||; s|/$||'):443" >> $GITHUB_OUTPUT

      - name: Build and push recommendationservice
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/recommendationservice:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" ./src/recommendationservice
          docker push "$IMAGE_URI"
      - name: Deploy recommendationservice
        id: deploy-recommendationservice
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: recommendationservice
          image: '${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/recommendationservice:${{ env.IMAGE_TAG }}'
          region: '${{ env.GCP_REGION }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated --use-http2 --port=8080'
          env_vars: |
            PRODUCT_CATALOG_SERVICE_ADDR=${{ steps.productcatalogservice-addr.outputs.addr }}
      - name: Capture recommendationservice addr
        id: recommendationservice-addr
        run: echo "addr=$(echo '${{ steps.deploy-recommendationservice.outputs.url }}' | sed 's|^https://||; s|/$||'):443" >> $GITHUB_OUTPUT

      - name: Build and push checkoutservice
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/checkoutservice:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" ./src/checkoutservice
          docker push "$IMAGE_URI"
      - name: Deploy checkoutservice
        id: deploy-checkoutservice
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: checkoutservice
          image: '${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/checkoutservice:${{ env.IMAGE_TAG }}'
          region: '${{ env.GCP_REGION }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated --use-http2 --port=8080'
          env_vars: |
            SHIPPING_SERVICE_ADDR=${{ steps.shippingservice-addr.outputs.addr }}
            PRODUCT_CATALOG_SERVICE_ADDR=${{ steps.productcatalogservice-addr.outputs.addr }}
            CART_SERVICE_ADDR=${{ steps.cartservice-addr.outputs.addr }}
            CURRENCY_SERVICE_ADDR=${{ steps.currencyservice-addr.outputs.addr }}
            EMAIL_SERVICE_ADDR=${{ steps.emailservice-addr.outputs.addr }}
            PAYMENT_SERVICE_ADDR=${{ steps.paymentservice-addr.outputs.addr }}
      - name: Capture checkoutservice addr
        id: checkoutservice-addr
        run: echo "addr=$(echo '${{ steps.deploy-checkoutservice.outputs.url }}' | sed 's|^https://||; s|/$||'):443" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/frontend:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" ./src/frontend
          docker push "$IMAGE_URI"
      - name: Deploy frontend
        id: deploy-frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: frontend
          image: '${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/frontend:${{ env.IMAGE_TAG }}'
          region: '${{ env.GCP_REGION }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated --port=8080'
          env_vars: |
            PRODUCT_CATALOG_SERVICE_ADDR=${{ steps.productcatalogservice-addr.outputs.addr }}
            CURRENCY_SERVICE_ADDR=${{ steps.currencyservice-addr.outputs.addr }}
            CART_SERVICE_ADDR=${{ steps.cartservice-addr.outputs.addr }}
            RECOMMENDATION_SERVICE_ADDR=${{ steps.recommendationservice-addr.outputs.addr }}
            CHECKOUT_SERVICE_ADDR=${{ steps.checkoutservice-addr.outputs.addr }}
            SHIPPING_SERVICE_ADDR=${{ steps.shippingservice-addr.outputs.addr }}
            AD_SERVICE_ADDR=${{ steps.adservice-addr.outputs.addr }}
            SHOPPING_ASSISTANT_SERVICE_ADDR=disabled.local:80
